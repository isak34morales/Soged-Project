<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soggy AI - Chat Interactivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .soggy-chat-container {
            max-width: 800px;
            margin: 2rem auto;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .soggy-header {
            background: linear-gradient(135deg, #28A745 0%, #20C997 100%);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .soggy-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .soggy-info h3 {
            color: white;
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .soggy-info p {
            color: rgba(255, 255, 255, 0.9);
            margin: 0.25rem 0 0 0;
            font-size: 0.9rem;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 1.5rem;
            background: white;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 1rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, #28A745, #20C997);
            color: white;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #FFB300, #FFA726);
            color: white;
        }

        .message-content {
            max-width: 70%;
            padding: 1rem;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .message.ai .message-content {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-top-left-radius: 5px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #28A745, #20C997);
            color: white;
            border-top-right-radius: 5px;
        }

        .typing-indicator {
            display: flex;
            gap: 0.25rem;
            padding: 0.5rem;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #28A745;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        .chat-input-area {
            padding: 1.5rem;
            background: #f8f9fa;
            border-top: 2px solid #e9ecef;
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
        }

        .chat-input {
            flex: 1;
            padding: 0.875rem 1.25rem;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: #28A745;
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.1);
        }

        .chat-input:disabled {
            background: #e9ecef;
            cursor: not-allowed;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #28A745, #20C997);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 768px) {
            .soggy-chat-container {
                margin: 1rem;
                border-radius: 15px;
            }

            .soggy-avatar {
                width: 60px;
                height: 60px;
            }

            .soggy-info h3 {
                font-size: 1.2rem;
            }

            .chat-messages {
                height: 300px;
            }

            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="soggy-chat-container">
        <div class="soggy-header">
            <img src="../Images/Soged/Newturttle.png" alt="Soggy" class="soggy-avatar">
            <div class="soggy-info">
                <h3>Soggy AI</h3>
                <p>Tu tutor experto en lenguas indígenas de Panamá</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message ai">
                <div class="message-avatar">
                    <i class="fas fa-turtle"></i>
                </div>
                <div class="message-content">
                    ¡Hola! Soy Soggy, tu mascota y tutor en lenguas indígenas de Panamá. Estoy aquí para ayudarte a aprender Guna, Ngäbe y Naso. ¿En qué puedo ayudarte hoy?
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-group">
                <input type="text" 
                       class="chat-input" 
                       id="messageInput" 
                       placeholder="Escribe tu mensaje aquí..." 
                       autocomplete="off">
                <button class="send-btn" id="sendBtn" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        let isLoading = false;
        let userId = localStorage.getItem('userId') || generateUserId();
        localStorage.setItem('userId', userId);

        function generateUserId() {
            return 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'message-avatar';
            avatarDiv.innerHTML = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-turtle"></i>';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            messageDiv.appendChild(avatarDiv);
            messageDiv.appendChild(contentDiv);
            
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';
            
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'message-avatar';
            avatarDiv.innerHTML = '<i class="fas fa-turtle"></i>';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            
            typingDiv.appendChild(avatarDiv);
            typingDiv.appendChild(contentDiv);
            chatMessages.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        function setLoading(loading) {
            isLoading = loading;
            messageInput.disabled = loading;
            sendBtn.disabled = loading || !messageInput.value.trim();
            
            if (loading) {
                showTypingIndicator();
            } else {
                removeTypingIndicator();
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;
            setLoading(true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        message: message
                    })
                });

                const data = await response.json();

                if (data.success) {
                    addMessage(data.response, false);
                } else {
                    addMessage('Lo siento, hubo un error al procesar tu mensaje. Por favor, intenta nuevamente.', false);
                }
            } catch (error) {
                console.error('Error sending message:', error);
                addMessage('Lo siento, hubo un error de conexión. Por favor, verifica tu conexión a internet e intenta nuevamente.', false);
            } finally {
                setLoading(false);
            }
        }

        messageInput.addEventListener('input', () => {
            sendBtn.disabled = !messageInput.value.trim() || isLoading;
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        // Initial scroll to bottom
        scrollToBottom();
    </script>
</body>
</html>
